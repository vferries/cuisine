name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Unit tests (tooling + web)
        run: pnpm test

      - name: Install Playwright browsers
        run: pnpm --filter @cuisine/web exec playwright install --with-deps chromium

      - name: E2E tests
        run: pnpm test:e2e
        env:
          CI: "true"
