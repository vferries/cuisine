name: Android Release

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: android-actions/setup-android@v3

      - uses: gradle/actions/setup-gradle@v4

      - name: Check signing secrets
        env:
          SIGNING_KEYSTORE_B64: ${{ secrets.SIGNING_KEYSTORE_B64 }}
          SIGNING_KEYSTORE_PASSWORD: ${{ secrets.SIGNING_KEYSTORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          echo "SIGNING_KEYSTORE_B64 length:      ${#SIGNING_KEYSTORE_B64}"
          echo "SIGNING_KEYSTORE_PASSWORD length: ${#SIGNING_KEYSTORE_PASSWORD}"
          echo "SIGNING_KEY_ALIAS length:         ${#SIGNING_KEY_ALIAS}"
          echo "SIGNING_KEY_PASSWORD length:      ${#SIGNING_KEY_PASSWORD}"
          if [ -z "$SIGNING_KEYSTORE_B64" ] || [ -z "$SIGNING_KEYSTORE_PASSWORD" ] || [ -z "$SIGNING_KEY_ALIAS" ] || [ -z "$SIGNING_KEY_PASSWORD" ]; then
            echo "::error::One or more signing secrets are empty — check repository secrets at Settings → Secrets and variables → Actions."
            exit 1
          fi

      - name: Decode keystore
        run: |
          mkdir -p keystore
          echo "${{ secrets.SIGNING_KEYSTORE_B64 }}" | base64 -d > keystore/release.keystore
          echo "Keystore file size: $(wc -c < keystore/release.keystore) bytes"

      - name: Verify keystore password with keytool
        env:
          SIGNING_KEYSTORE_PASSWORD: ${{ secrets.SIGNING_KEYSTORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
        run: |
          keytool -list -keystore keystore/release.keystore -storepass "$SIGNING_KEYSTORE_PASSWORD" -alias "$SIGNING_KEY_ALIAS" > /dev/null
          echo "keytool -list OK: keystore password and alias match the decoded keystore."

      - name: Build release APK and AAB
        run: ./gradlew :app:assembleRelease :app:bundleRelease
        env:
          SIGNING_KEYSTORE_PASSWORD: ${{ secrets.SIGNING_KEYSTORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            android/app/build/outputs/apk/release/*.apk
            android/app/build/outputs/bundle/release/*.aab
          generate_release_notes: true
